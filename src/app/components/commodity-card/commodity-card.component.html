<!-- src/app/components/commodity-card/commodity-card.component.html -->
<div class="commodity-card" [class]="predictionClass">
  <div class="card-top">
    <div class="card-identity">
      <span class="card-icon">{{ icon }}</span>
      <div>
        <div class="card-name">{{ name }}</div>
        <div class="card-exchange">{{ exchange }}</div>
      </div>
    </div>
    <div class="prediction-badge" [class]="'badge-' + predictionClass">
      <span class="badge-arrow">{{ isBullish ? '▲' : '▼' }}</span>
      {{ data.prediction }}
    </div>
  </div>

  <div class="card-price">{{ data.current_price_approx }}</div>

  <div class="card-range">
    <span class="range-label">Target Range</span>
    <span class="range-value">{{ rangeDisplay }}</span>
  </div>

  <div class="card-divider"></div>

  <p class="card-reason">{{ data.reason }}</p>

  <div class="card-action" [class]="actionClass">
    {{ data.action }}
  </div>
</div>
